<script>
    b_usuario.innerHTML = sessionStorage.NOME_USUARIO;

    let proximaAtualizacao;

    window.onload = exibirTanquesDoUsuario();

    function exibirTanquesDoUsuario() {
        var Tanques = JSON.parse(sessionStorage.TanqueS);
        Tanques.forEach(item => {
            document.getElementById("btnTanque").innerHTML += `
            <button class="btn-chart" onclick="exibirTanque(${item.id})" id="btnTanque${item.id}">${item.descricao}</button>
            `

            document.getElementById("graficos").innerHTML += `
                <div id="grafico${item.id}" class="display-none">
                    <h3 class="tituloGraficos">
                        <span id="tituloTanque${item.id}">${item.descricao}</span>
                    </h3>
                   <div class="cards-graficos">
                    <div class="card-grafico">
                        <h4>Temperatura</h4>
                        <canvas id="graficoA${item.id}"></canvas>
                    </div>

                    <div class="card-grafico">
                        <h4>Umidade</h4>
                        <canvas id="graficoB${item.id}"></canvas>
                    </div>
                </div>
                    <div class="label-captura">
                        <p id="avisoCaptura${item.id}" style="color: white"></p>
                    </div>
                </div>
            `

            obterDadosGrafico(item.id)
        });

        if (Tanques.length > 0) {
            exibirTanque(Tanques[0].id)
        }
    }

    function alterarTitulo(idTanque) {
        var tituloTanque = document.getElementById(`tituloTanque${idTanque}`)
        var descricao = JSON.parse(sessionStorage.TanqueS).find(item => item.id == idTanque).descricao;
        tituloTanque.innerHTML = "Últimas medidas de Temperatura e Umidade do <span style='color: #e6005a'>" + descricao + "</span>"
    }

    function exibirTanque(idTanque) {
        let todosOsGraficos = JSON.parse(sessionStorage.TanqueS);

        for (i = 0; i < todosOsGraficos.length; i++) {
            // exibindo - ou não - o gráfico
            if (todosOsGraficos[i].id != idTanque) {
                let elementoAtual = document.getElementById(`grafico${todosOsGraficos[i].id}`)
                if (elementoAtual.classList.contains("display-block")) {
                    elementoAtual.classList.remove("display-block")
                }
                elementoAtual.classList.add("display-none")

                // alterando estilo do botão
                let btnAtual = document.getElementById(`btnTanque${todosOsGraficos[i].id}`)
                if (btnAtual.classList.contains("btn-pink")) {
                    btnAtual.classList.remove("btn-pink")
                }
                btnAtual.classList.add("btn-white")
            }
        }

        // exibindo - ou não - o gráfico
        let graficoExibir = document.getElementById(`grafico${idTanque}`)
        graficoExibir.classList.remove("display-none")
        graficoExibir.classList.add("display-block")

        // alterando estilo do botão
        let btnExibir = document.getElementById(`btnTanque${idTanque}`)
        btnExibir.classList.remove("btn-white")
        btnExibir.classList.add("btn-pink")
    }

    // O gráfico é construído com três funções:
    // 1. obterDadosGrafico -> Traz dados do Banco de Dados para montar o gráfico da primeira vez
    // 2. plotarGrafico -> Monta o gráfico com os dados trazidos e exibe em tela
    // 3. atualizarGrafico -> Atualiza o gráfico, trazendo novamente dados do Banco

    // Esta função *obterDadosGrafico* busca os últimos dados inseridos em tabela de medidas.
    // para, quando carregar o gráfico da primeira vez, já trazer com vários dados.
    // A função *obterDadosGrafico* também invoca a função *plotarGrafico*

    //     Se quiser alterar a busca, ajuste as regras de negócio em src/controllers
    //     Para ajustar o "select", ajuste o comando sql em src/models
    function obterDadosGrafico(idTanque) {

        alterarTitulo(idTanque)

        if (proximaAtualizacao != undefined) {
            clearTimeout(proximaAtualizacao);
        }

        fetch(`/medidas/ultimas/${idTanque}`, { cache: 'no-store' }).then(function (response) {
            if (response.ok) {
                response.json().then(function (resposta) {
                    console.log(`Dados recebidos: ${JSON.stringify(resposta)}`);
                    resposta.reverse();

                    plotarGrafico(resposta, idTanque);

                });
            } else {
                console.error('Nenhum dado encontrado ou erro na API');
            }
        })

        
            .catch(function (error) {
                console.error(`Erro na obtenção dos dados p/ gráfico: ${error.message}`);
            });
    }

    // Esta função *plotarGrafico* usa os dados capturados na função anterior para criar o gráfico
    // Configura o gráfico (cores, tipo, etc), materializa-o na página e, 
    // A função *plotarGrafico* também invoca a função *atualizarGrafico*
   function plotarGrafico(resposta, idTanque) {

    let labels = [];

    let dadosTemp = [];
    let dadosUmidade = [];

    for (let i = 0; i < resposta.length; i++) {
        let registro = resposta[i];
        labels.push(registro.momento_grafico);
        dadosTemp.push(registro.temperatura);
        dadosUmidade.push(registro.umidade);
    }

    // GRÁFICO A 
    const ctxA = document.getElementById(`graficoA${idTanque}`).getContext('2d');

    let chartA = new Chart(ctxA, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: 'Temperatura (°C)',
                data: dadosTemp,
                borderWidth: 1
            }]
        },
        options: {
            responsive: true,
            plugins: {
                title: {
                    display: true,
                    text: 'Tanque A'
                }
            }
        }
    });

    // GRÁFICO B 
    const ctxB = document.getElementById(`graficoB${idTanque}`).getContext('2d');

    let chartB = new Chart(ctxB, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: 'Umidade (%)',
                data: dadosUmidade,
                borderWidth: 1
            }]
        },
        options: {
            responsive: true,
            plugins: {
                title: {
                    display: true,
                    text: 'Tanque B'
                }
            }
        }
    });

    setTimeout(() => atualizarGrafico(idTanque, {labels, dadosTemp, dadosUmidade}, chartA, chartB), 2000);
}


    // Esta função *atualizarGrafico* atualiza o gráfico que foi renderizado na página,
    // buscando a última medida inserida em tabela contendo as capturas, 

    //     Se quiser alterar a busca, ajuste as regras de negócio em src/controllers
    //     Para ajustar o "select", ajuste o comando sql em src/models
        function atualizarGrafico(idTanque, dados, chartA, chartB){


        fetch(`/medidas/tempo-real/${idTanque}`, { cache: 'no-store' }).then(function (response) {
            if (response.ok) {
                response.json().then(function (novoRegistro) {

                    obterdados(idTanque);
                    // alertar(novoRegistro, idTanque);
                    console.log(`Dados recebidos: ${JSON.stringify(novoRegistro)}`);
                    console.log(`Dados atuais do gráfico:`);
                    console.log(dados);

                    let avisoCaptura = document.getElementById(`avisoCaptura${idTanque}`)
                    avisoCaptura.innerHTML = ""


                    if (novoRegistro[0].momento_grafico == dados.labels[dados.labels.length - 1]) {
                        console.log("---------------------------------------------------------------")
                        console.log("Como não há dados novos para captura, o gráfico não atualizará.")
                        avisoCaptura.innerHTML = "<i class='fa-solid fa-triangle-exclamation'></i> Foi trazido o dado mais atual capturado pelo sensor. <br> Como não há dados novos a exibir, o gráfico não atualizará."
                        console.log("Horário do novo dado capturado:")
                        console.log(novoRegistro[0].momento_grafico)
                        console.log("Horário do último dado capturado:")
                        console.log(dados.labels[dados.labels.length - 1])
                        console.log("---------------------------------------------------------------")
                    } else {
                        dados.labels.shift();
                        dados.labels.push(novoRegistro[0].momento_grafico);

                        dados.dadosTemp.shift();
                        dados.dadosTemp.push(novoRegistro[0].temperatura);

                        dados.dadosUmidade.shift();
                        dados.dadosUmidade.push(novoRegistro[0].umidade);

                        // atualizar gráfico A
                        chartA.data.labels = dados.labels;
                        chartA.data.datasets[0].data = dados.dadosTemp;
                        chartA.update();

                        // atualizar gráfico B 
                        chartB.data.labels = dados.labels;
                        chartB.data.datasets[0].data = dados.dadosUmidade;
                        chartB.update();
}

                    proximaAtualizacao = setTimeout(() => atualizarGrafico(idTanque, dados, myChart), 2000);
                });
            } else {
                console.error('Nenhum dado encontrado ou erro na API');
                // Altere aqui o valor em ms se quiser que o gráfico atualize mais rápido ou mais devagar
                proximaAtualizacao = setTimeout(() => atualizarGrafico(idTanque, dados, myChart), 2000);
            }
        })
            .catch(function (error) {
                console.error(`Erro na obtenção dos dados p/ gráfico: ${error.message}`);
            });

    }
</script>
