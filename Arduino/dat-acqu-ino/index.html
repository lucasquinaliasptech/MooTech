<!doctype html>
<html>

<head>
    <title>Graphics</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="reset.css">
    <link rel="stylesheet" href="Dashboard_Arduino.css">
</head>

<body>
<center>
    <h1 style="color: #fdcbe4;">
        D A S H B O A R D
    </h1>
        <div class="container">
            <div class="grafico">
                <canvas id="sensorTemperatura"></canvas>
            </div>
            <div class="grafico">
                <canvas id="sensorUmidade"></canvas>
            </div>
        </div>

</center>
    <div style="display: flex;">
        <div style="width: 50%;">
            <canvas id="sensorTemperatura"></canvas>
        </div>
        <div style="width: 50%;">
            <canvas id="sensorUmidade"></canvas>
        </div>
    </div>

    <script>

        const kpiTemp = {
            id:'kpiTemp', 
            beforeDraw(chart, args, options) {
                const {ctx, chartArea: {top, right, bottom, left, width, height},
                    scales: {x, y} } = chart;
                ctx.save(); 

                ctx.strokeStyle = options.tempmaxima;
                ctx.strokeRect(left, y.getPixelForValue(4), width, 0);
                ctx.restore();

                ctx.strokeStyle = options.tempminima;
                ctx.strokeRect(left, y.getPixelForValue(0), width, 0);
                ctx.restore();
            }
        }

        const kpiUmi = {
            id:'kpiUmi', 
            beforeDraw(chart, args, options) {
                const {ctx, chartArea: {top, right, bottom, left, width, height},
                    scales: {x, y} } = chart;
                ctx.save(); 

                ctx.strokeStyle = options.umimaxima;
                ctx.strokeRect(left, y.getPixelForValue(100), width, 0);
                ctx.restore();

                ctx.strokeStyle = options.umiminima;
                ctx.strokeRect(left, y.getPixelForValue(75), width, 0);
                ctx.restore();
            }
        }


        var sensorTemperatura = new Chart(document.getElementById('sensorTemperatura').getContext('2d'), {
            type: 'line',
            data: {
                datasets: [{
                    title: 'Temperatura em Tempo Real - Arduino',
                    label: 'Temperatura',
                    borderColor: '#F5F5F5',
                    backgroundColor: '#ED145B',
                }]
            },
            options: {
                plugins: {

                    title: {
                        display: true,
                        text: 'Temperatura em Tempo Real - Arduino',
                        color: '#c22929',
                        font: {
                            family: 'Poppins, sans-serif',
                            size: 25,
                            
                        }
                    }
                },
                scales: {
                    x: {
                        beginAtZero: true
                    },
                    y: {
                title: {
                    display: true,
                    text: '(˚C)'
                },
                beginAtZero: true,
            },
        },
        plugins: {
            kpiTemp: {
                tempmaxima: 'green',
                tempminima: 'red'
            }
        }
    },
    plugins : [kpiTemp]
});

        

        var sensorUmidade = new Chart(document.getElementById('sensorUmidade').getContext('2d'), {
            type: 'line',
            data: {
                datasets: [{
                    label: 'Umidade',
                    borderColor: '#F5F5F5',
                    backgroundColor: '#0000FF'
                }]
            },
            options: {
                plugins: {
                    title: {
                        display: true,
                        text: 'Umidade em Tempo Real - Arduino',
                        color: '#2d66ac',
                        font: {
                            family: 'Poppins, sans-serif',
                            size: 25,
                            
                        }
                    }
                },
                scales: {
                    x: {
                        beginAtZero: true
                    },
                    y: {
                title: {
                    display: true,
                    text: '(%)'
                },
                beginAtZero: true,
            },
        }, 

        plugins: {
            kpiUmi: {
                umimaxima: 'green',
                umiminima: 'red'
            }
        }
    },
    plugins: [kpiUmi]
});

        var paginacao = {};
        var tempo = {};

        function obterDados(grafico, endpoint) {
            fetch('http://localhost:3300/sensores/' + endpoint)
                .then(response => response.json())
                .then(valores => {
                    if (paginacao[endpoint] == null) {
                        paginacao[endpoint] = 0;
                    }
                    if (tempo[endpoint] == null) {
                        tempo[endpoint] = 0;
                    }

                    var ultimaPaginacao = paginacao[endpoint];
                    paginacao[endpoint] = valores.length;
                    valores = valores.slice(ultimaPaginacao);

                    valores.forEach((valor) => {
                        if (grafico.data.labels.length == 10 && grafico.data.datasets[0].data.length == 10) {
                            grafico.data.labels.shift();
                            grafico.data.datasets[0].data.shift();
                        }

                        grafico.data.labels.push(tempo[endpoint]++);
                        grafico.data.datasets[0].data.push(parseFloat(valor));
                        grafico.update();
                    });
                })
                .catch(error => console.error('Erro ao obter dados:', error));
        }

        setInterval(() => {
            obterDados(sensorTemperatura, 'temperatura');
            obterDados(sensorUmidade, 'umidade');
        }, 1000);

    </script>
</body>

</html>
