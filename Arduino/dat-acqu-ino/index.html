<!doctype html>
<html>

<head>
    <title>Graphics</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script
        src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>
    <link rel="stylesheet" href="reset.css">
    <link rel="stylesheet" href="Dashboard_Arduino.css">
</head>

<body>
    <center>
        <h1 style="color: #fdcbe4;">
            D A S H B O A R D
        </h1>
        <div class="container">
            <div class="grafico">
                <canvas id="sensorTemperatura"></canvas>
            </div>
            <div class="grafico">
                <canvas id="sensorUmidade"></canvas>
            </div>
        </div>

    </center>
    <div style="display: flex;">
        <div style="width: 50%;">
            <canvas id="sensorTemperatura"></canvas>
        </div>
        <div style="width: 50%;">
            <canvas id="sensorUmidade"></canvas>
        </div>
    </div>

    <script>
        var sensorTemperatura = new Chart(document.getElementById('sensorTemperatura').getContext('2d'), {
            type: 'line',
            data: {
                datasets: [{
                    title: 'Temperatura em Tempo Real - Arduino',
                    label: 'Temperatura',
                    borderColor: '#ED145B',
                    backgroundColor: '#ED145B',
                }]
            },
            options: {
                scales: {
                    x: {
                        beginAtZero: true
                    },
                    y: {
                        title: {
                            display: true,
                            text: '(˚C)'
                        },
                        suggestedMin: 0,
                        suggestedMax: 6
                    }
                },
                plugins: {
                    title: {
                        display: true,
                        text: 'Temperatura em Tempo Real - Arduino',
                        color: '#c22929',
                        font: {
                            family: 'Poppins, sans-serif',
                            size: 25,

                        }
                    },
                    annotation: {
                        annotations: {
                            linhaMax: {
                                type: "line",
                                yMin: 4,
                                yMax: 4,
                                borderColor: "red",
                                borderWidth: 2,
                                label: {
                                    display: true,
                                    content: "Limite Máximo (4°C)",
                                    position: "end"
                                }
                            },
                            linhaMin: {
                                type: "line",
                                yMin: 0,
                                yMax: 0,
                                borderColor: "red",
                                borderWidth: 2,
                                label: {
                                    display: true,
                                    content: "Limite Mínimo (0°C)",
                                    position: "end"
                                }
                            }
                        }
                    }
                }
            }
        });



        var sensorUmidade = new Chart(document.getElementById('sensorUmidade').getContext('2d'), {
            type: 'line',
            data: {
                datasets: [{
                    label: 'Umidade',
                    borderColor: '#0000FF',
                    backgroundColor: '#0000FF'
                }]
            },
            options: {
                scales: {
                    x: {
                        beginAtZero: true
                    },
                    y: {
                        title: {
                            display: true,
                            text: '(%)'
                        },
                        suggestedMin: 60,
                        suggestedMax: 100
                    }
                },
                plugins: {
                    title: {
                        display: true,
                        text: 'Umidade em Tempo Real - Arduino',
                        color: '#2d66ac',
                        font: {
                            family: 'Poppins, sans-serif',
                            size: 25
                        }
                    },
                    annotation: {
                        annotations: {
                            linhaMax: {
                                type: "line",
                                yMin: 100,
                                yMax: 100,
                                borderColor: "red",
                                borderWidth: 2,
                                label: {
                                    display: true,
                                    content: "Limite Máximo (100%)",
                                    position: "end"
                                }
                            },
                            linhaMin: {
                                type: "line",
                                yMin: 75,
                                yMax: 75,
                                borderColor: "red",
                                borderWidth: 2,
                                label: {
                                    display: true,
                                    content: "Limite Mínimo (75%)",
                                    position: "end"
                                }
                            }
                        }
                    }
                }
            }
        });

        var paginacao = {};
        var tempo = {};

        function obterDados(grafico, endpoint) {
            fetch('http://localhost:3300/sensores/' + endpoint)
                .then(response => response.json())
                .then(valores => {
                    if (paginacao[endpoint] == null) {
                        paginacao[endpoint] = 0;
                    }
                    if (tempo[endpoint] == null) {
                        tempo[endpoint] = 0;
                    }

                    var ultimaPaginacao = paginacao[endpoint];
                    paginacao[endpoint] = valores.length;
                    valores = valores.slice(ultimaPaginacao);

                    valores.forEach((valor) => {
                        if (grafico.data.labels.length == 10 && grafico.data.datasets[0].data.length == 10) {
                            grafico.data.labels.shift();
                            grafico.data.datasets[0].data.shift();
                        }

                        grafico.data.labels.push(tempo[endpoint]++);
                        grafico.data.datasets[0].data.push(parseFloat(valor));
                        grafico.update();
                    });
                })
                .catch(error => console.error('Erro ao obter dados:', error));
        }

        setInterval(() => {
            obterDados(sensorTemperatura, 'temperatura');
            obterDados(sensorUmidade, 'umidade');
        }, 1000);

    </script>
</body>

</html>
